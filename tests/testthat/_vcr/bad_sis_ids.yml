        management / trade controls","value":"No"}]}],"identification_information":null,"extreme_fluctuations":null,"no_of_subpopulations":null,"continuing_decline_in_subpopulations":null,"extreme_fluctuations_in_subpopulations":null,"all_individuals_in_one_subpopulation":null,"no_of_individuals_in_largest_subpopulation":null,"estimated_area_of_occupancy":null,"continuing_decline_in_area_of_occupancy":null,"extreme_fluctuations_in_area_of_occupancy":null,"estimated_extent_of_occurence":null,"continuing_decline_in_extent_of_occurence":null,"extreme_fluctuations_in_extent_of_occurence":null,"continuing_decline_in_number_of_locations":null,"extreme_fluctuations_in_number_of_locations":null},"documentation":{"range":"The
        Pacific Guitarfish occurs from southern Mexico to northern Chile including
        the Galápagos\u0026#160;Islands (Ecuador) in the Eastern Central and Southeast
        Pacific (Last \u003cem\u003eet al.\u003c/em\u003e 2016b).","population":"\u003cp\u003eThere
        are no available data on population trend of the Pacific Guitarfish. In some
        areas it appears to be rare or in low abundance (e.g., El Salvador, Costa
        Rica, Colombia), but in others it is a common target or bycatch species (e.g.,
        Ecuador, Peru), suggesting that its core distribution is in southern areas
        of its range. Inshore guitarfishes are susceptible to population reduction
        and overexploitation where they are heavily fished (Moore 2017). The Pacific
        Guitarfish is subjected to intense and largely unmanaged fishing pressure
        throughout most of its range (including targeted fishing), with little refuge
        (except in some remote areas).\u003cbr/\u003e\u003cbr/\u003eOverall, due to
        levels of exploitation from its exposure to inadequately managed fisheries
        throughout much of its range, it is suspected that the Pacific Guitarfish
        has undergone a population reduction of 30–49% over the last three generations
        (15 years).\u003c/p\u003e","habitats":"\u003cp\u003e\u003cspan lang=\"EN-US\"\u003eThe
        Pacific Guitarfish inhabits shallow inshore and continental shelf waters to
        a depth of 50 m (Weigmann 2016). It reaches a maximum size of 125 cm total
        length (Silva-Garay \u003cem\u003eet al. \u003c/em\u003e2018).\u0026#160;Reproduction
        is viviparous but nothing else is known of its biology.\u0026#160;\u003cspan
        lang=\"EN-US\"\u003eAge data are not available for this species, but generation
        length is inferred to be 5 years based on a generation length of 9 years for
        the larger\u0026#160;Shovelnose Guitarfish (\u003cem\u003ePseudobatos productus\u003c/em\u003e)
        (170 cm TL) (Timmons and Bray 1997).\u003c/span\u003e\u003c/p\u003e","threats":"This
        species is targeted either directly or as part of multi-species fisheries
        using gillnet, longline, and beach-seine. It is also a bycatch of large-scale
        and small-scale shrimp trawl fisheries and small-scale gillnet fisheries and
        is usually retained for its meat. There is little information available on
        catches in northern parts of its range and it is only irregularly recorded
        in El Salvador (Fuentes and Hernández 2004), Costa Rica (Clarke \u003cem\u003eet
        al. \u003c/em\u003e2016, Espinoza \u003cem\u003eet al. \u003c/em\u003e2018),
        and Colombia (Mejía-Falla and Navia 2019). Catches are higher in Ecuador and
        Peru where it is a regular bycatch in the former (Tenelema-Delgado \u003cem\u003eet
        al. \u003c/em\u003e2014), and a target species in the latter. The most important
        landing areas are northern and central Peru where between 1997 and 2015, catches
        fluctuated with declines from 2002 to 2006 before catches increased and peaked
        in 2007–2008, were then low between 2009 and 2013, before peaking again in
        2014–2015; this species is the third most landed ray species in Peru as estimated
        from government landing reports (A. Gonzalez-Pestana unpubl. data 2020).\u0026#160;In
        Chile, this species it is caught incidentally in multi-species fisheries and
        beach-seines in the north of the country (Lamilla \u003cem\u003eet al. \u003c/em\u003e2010).\u003cbr/\u003e\u003cbr/\u003eOverall,
        there is high spatial overlap with fisheries (which generally lack management
        or effective enforcement of regulations across most of its range) and the
        species has little refuge from fishing activities that operate across its
        range.\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e","measures":"There are no
        species-specific measures in place for the Pacific Guitarfish.\u0026#160;In
        the Mexican Pacific, there is a closed season for targeted elasmobranch fishing
        from May 1st to July 31st, but enforcement is inadequate (O. Sosa-Nishizaki
        pers. comm. 2019).\u0026#160;\u003cspan class=\"msoins0\"\u003eA temporal
        ban of shrimp trawl fisheries is established in Colombia (January to March)
        but enforcement is also inadequate (Mejía-Falla and Navia 2017). Additionally,
        targeted industrial fishing of sharks and rays is prohibited in Colombia,
        with set bycatch limits (up to 35% of bycatch in the national territory; Resolution
        1743 of 2017); however, surveillance and compliance requires strengthening.
        Benthic trawling and mechanized beach seines have been prohibited in the coastal
        zone of Peru (to 5 nm from shore) since 2001 (Regulation: DS-012-2001-PE)
        and manual beach seines from 2009 (Regulation: RM-112-2009-PRODUCE ). This
        has likely reduced the catch of inshore elasmobranchs in Peruvian coastal
        waters. The Galápagos Archipelago is covered by the 133,000 km² Galápagos\u0026#160;Marine
        Reserve which prohibits industrial fishing but allows artisanal fishing (Davos\u0026#160;\u003cem\u003eet
        al.\u003c/em\u003e\u0026#160;2007). The enforcement of regulations is limited
        and illegal fishing is prevalent, particularly for sharks (Hearn\u0026#160;\u003cem\u003eet
        al.\u0026#160;\u003c/em\u003e2014, Schiller\u0026#160;\u003cem\u003eet al.\u0026#160;\u003c/em\u003e2015),
        and artisanal fishing pressure continues.\u003cspan class=\"msoins0\"\u003e\u003cbr/\u003e\u003cspan
        class=\"msoins0\"\u003e\u003cbr/\u003e\u003cspan class=\"msoins0\"\u003eFurther
        research is needed on life history, the level of mortality due to fisheries,
        and population size and trend.\u0026#160;Both small- and large-scale fisheries
        should be monitored for bycatch at the species level.\u003c/span\u003e\u003c/span\u003e","use_trade":"This
        guitarfish is retained and the meat is consumed or sold locally.","rationale":"\u003cp\u003eThe
        Pacific Guitarfish (\u003cem\u003ePseudobatos planiceps\u003c/em\u003e) is
        a small (to at least 125 cm total length) shark-like ray which occurs from
        southern Mexico to northern Chile and the Galápagos\u0026#160;Islands (Ecuador)
        in the Eastern Central and Southeast Pacific. It inhabits shallow inshore
        and continental shelf waters to a depth of 50 m. This species is targeted
        either directly (e.g., in Peru) or as part of multi-species fisheries using
        gillnet, longline, and beach-seine. It is also a bycatch of large-scale and
        small-scale shrimp trawl fisheries and small-scale gillnet fisheries and is
        usually retained for its meat. Fisheries operate throughout most of the range
        of the species with inadequate management or enforcement and the species has
        little refuge from fishing activities. It is under particularly heavy fishing
        pressure in Peru where it is the third most landed ray species. Overall, given
        the intensity of fishing pressure throughout its range and its susceptibility
        to capture, it is suspected that the Pacific Guitarfish\u0026#160;has undergone
        a population reduction of 30–49% over the last three generation lengths (15
        years) due to levels of exploitation, and it is assessed as Vulnerable A2d.\u003cspan
        style=\"\"\u003e\u003c/span\u003e\u003c/p\u003e","trend_justification":null,"taxonomic_notes":"Last
        \u003cem\u003eet al\u003c/em\u003e. (2016a) revised the genus \u003cem\u003eRhinobatos\u003c/em\u003e,
        transferring \u003cem\u003eglaucostigma\u003c/em\u003e, \u003cem\u003ehorkelii\u003c/em\u003e,
        \u003cem\u003elentiginosus\u003c/em\u003e, \u003cem\u003eleucorhynchus\u003c/em\u003e,
        \u003cem\u003epercellens\u003c/em\u003e, \u003cem\u003eplaniceps\u003c/em\u003e,
        \u003cem\u003eprahli\u003c/em\u003e, and \u003cem\u003eproductus\u003c/em\u003e
        to the new genus \u003cem\u003ePseudobatos\u003c/em\u003e.\u003cbr/\u003e\u003cbr/\u003eIn
        Chile, a second rhinobatid species is known from just a dried head:\u0026#160;\u003cem\u003eTarsistes
        philippi\u003c/em\u003e Jordan, 1918. The taxonomic situation of this species
        is not clear."},"biogeographical_realms":[],"conservation_actions":[{"note":"","code":"5_4_2","description":{"en":"National

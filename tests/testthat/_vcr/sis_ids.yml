        planiceps","species_taxa":[],"subpopulation_taxa":[],"infrarank_taxa":[],"kingdom_name":"ANIMALIA","phylum_name":"CHORDATA","class_name":"CHONDRICHTHYES","order_name":"RHINOPRISTIFORMES","family_name":"RHINOBATIDAE","genus_name":"Pseudobatos","species_name":"planiceps","subpopulation_name":null,"infra_name":null,"authority":"(Garman,

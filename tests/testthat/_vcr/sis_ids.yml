        White-spotted Ratfish is known along the western coast of North America, from
        southeast Alaska (at least Cape Fairweather) to the Gulf of California, with
        some scattered records to Cape Blanco, Costa Rica, in the Eastern Pacific
        Ocean (Ebert and Dando 2024).","population":"Global population size is unknown,
        but there appears to be discrete populations across the White-Spotted Ratfish''s
        range. The species is considered abundant throughout its range from British
        Columbia to central Baja California and is amongst the most frequently reported
        species in fishery-independent surveys operating along the western coasts
        of Canada and the United States (e.g., Keller \u003cem\u003eet al\u003c/em\u003e.
        2017, Cornthwaite \u003cem\u003eet al\u003c/em\u003e. 2020, Essington \u003cem\u003eet
        al\u003c/em\u003e. 2021). A comparison of historical (1948–1977) and contemporary
        (1990–2016) trawl data sets in Puget Sound found the White-spotted Ratfish
        to dominate catch rates in both time periods, accounting for 70% of the total
        catch with no trend over time (Essington \u003cem\u003eet al\u003c/em\u003e.
        2021). Global population trend is suspected to be stable based on abundance
        data.","habitats":"The White-spotted Ratfish occurs from the intertidal zone
        to a depth of 1,463 m (Ebert and Dando 2024). It is common in bays and sounds
        in the northern part of its range but is found in progressively deeper water
        in the southern portions of its range. Maximum size is 28 cm snout-to-vent
        length (SVL; ~60 cm total length, TL), males mature at 14–16 cm SVL (30–35
        cm TL), females mature at 19–20 cm SVL (40–45 cm TL), and size-at-birth is
        4–5 cm SVL (Ebert and Dando 2024, D. Didier, unpubl. data). Reproduction is
        oviparous and fecundity is 20–29 eggs per year.","threats":"The Spotted Ratfish
        is taken as bycatch in industrial demersal trawl and longline fisheries across
        its range (Barnett \u003cem\u003eet al\u003c/em\u003e. 2012, Santana-Morales
        \u003cem\u003eet al\u003c/em\u003e. 2021, Espino Leal 2022). In the northern
        Gulf of California, the species is taken as bycatch in trawl fisheries targeting
        Pacific Hake (\u003cem\u003eMerluccius productus\u003c/em\u003e) at depths
        of 110–320 m (Zamora–García \u003cem\u003eet al\u003c/em\u003e. 2017, Espino
        Leal 2022). The species has little to no commercial value and is discarded.
        Post-release mortality is suspected to be high (Barnett \u003cem\u003eet al\u003c/em\u003e.
        2012). The species appears to be able to withstand fishing activity in Canada
        and the United States; expansion of fisheries in Mexico and Central America
        should be closely monitored.\u003cbr/\u003e\u003cbr/\u003eThe White-spotted
        Ratfish may be affected by future climate change impacts. The distribution
        of White-spotted Ratfish along the California Current was reported to shift
        northward between 1977 and 2013, and this response was suggested to be a response
        to long-term warming of the environment (Tolimieri \u003cem\u003eet al\u003c/em\u003e.
        2020).","measures":"The White-spotted Ratfish is designated as an Ecosystem
        Component (EC) Species in the Pacific Coast Groundfish Fishery (FMP Amendment
        24, PFMC 2022). Harvest specifications or management reference points are
        not required for EC species, but monitoring of EC species'' status or their
        vulnerability to the fishery is required (PFMC 2022). Further information
        is required on the species'' interactions with fisheries in Mexico and Central
        America.","use_trade":"In Canada and the United States, the White-spotted
        Ratfish has little to no commercial value and is discarded. In Mexico, incidental
        catch may be used as bait for traps (Santana-Morales \u003cem\u003eet al\u003c/em\u003e.
        2021).","rationale":"The White-spotted Ratfish (\u003cem\u003eHydrolagus colliei\u003c/em\u003e)
        is a medium-sized (to 28 cm snout-to-vent length or ~60 cm total length) deepwater
        chimaera known from the western coast of North America, from southeast Alaska
        (at least Cape Fairweather) to the Gulf of California, with some scattered
        records to Cape Blanco, Costa Rica, in the Eastern Pacific Ocean. It is recorded
        from the intertidal zones to depths of 1,463 m. The species is considered
        abundant throughout its range from British Columbia to central Baja California
        and is amongst the most frequently reported species in fishery-independent
        surveys operating along the western coasts of Canada and the United States.
        The White-spotted Ratfish is taken as bycatch in industrial bottom trawl and
        longline fisheries across its range, including trawl fisheries targeting Pacific
        Hake (\u003cem\u003eMerluccius productus\u003c/em\u003e) in the northern Gulf
        of Mexico. The species has little to no commercial value and is mostly discarded.
        At this time, global population trend is suspected to be stable based on abundance
        data and the White-spotted Ratfish is assessed as Least Concern.","trend_justification":null,"taxonomic_notes":null},"biogeographical_realms":[],"conservation_actions":[],"faos":[{"formerlyBred":null,"origin":"Native","presence":"Extant","seasonality":["Resident"],"description":{"en":"Pacific

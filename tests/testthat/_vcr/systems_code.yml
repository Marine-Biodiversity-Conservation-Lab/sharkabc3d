        Scalloped Hammerhead has a circumglobal distribution in coastal warm-temperate
        and tropical seas (Ebert \u003cem\u003eet al \u003c/em\u003e2013).","population":"\u003cp\u003e  \u003c/p\u003eThere
        are no data available on the population size of the Scalloped Hammerhead.
        Genetic data reveal that the global population structure varies between males
        and females. Only males move across ocean basins, while females only move
        regionally and not between discontinuous continental coastlines (Duncan \u003cem\u003eet
        al\u003c/em\u003e. 2006, Daly-Engel \u003cem\u003eet al\u003c/em\u003e. 2012).\u003cbr/\u003e\u003cbr/\u003eFour
        sets of population trend data are available: (1) a stock assessment in the
        Northwest Atlantic and Gulf of Mexico (Jiao \u003cem\u003eet al\u003c/em\u003e.
        2011); and from standardized catch-per-unit-effort (CPUE) in: (2) Northwest
        Atlantic and Gulf of Mexico (J. Carlson and W.B. Driggers unpubl. data); (3)
        the South Pacific (Simpfendorfer \u003cem\u003eet al\u003c/em\u003e. 2010);
        and, (4) the Indian Ocean (Dudley and Simpfendorfer 2006). For the South Pacific,
        there is bather protection mesh and drumline CPUE (Noriega \u003cem\u003eet
        al\u003c/em\u003e. 2011), yet these data spanned only one decade and were
        not considered in the global analysis. The above trend data were analysed
        over three generation lengths using a Bayesian state-space framework (a modification
        of Winker \u003cem\u003eet al\u003c/em\u003e. 2018). This analysis yields
        an annual rate of change, a median change over three generation lengths, and
        the probability of the most likely Red List Category percent change over three
        generations (see Supplementary Material).\u003cbr/\u003e\u003cbr/\u003eFirst,
        the Northwest Atlantic and Gulf of Mexico stock assessment indicated that
        the stock was overfished (B\u0026lt;Bmsy) from the early 1980s with overfishing
        (F\u0026gt;Fmsy) occurring periodically from 1983–2005 (Jiao et al. 2011).
        The steepest declines occurred prior to 1995, thereafter the abundance index
        remained stable until the end of the time series in 2005. The trend analysis
        of the modelled population abundance for 1981–2005 (25 years) yielded annual
        rates of reduction of 7.5% consistent with an estimated median reduction of
        99.6% over three generation lengths (72.3 years), with the highest probability
        of \u0026gt;80% reduction over three generation lengths.\u003cbr/\u003e\u003cbr/\u003eSecond,
        more recent data (1994–2017) are available from the Northwest Atlantic and
        Gulf of Mexico comprising two of the time-series underlying the Jiao \u003cem\u003eet
        al\u003c/em\u003e. (2011) stock assessment (J. Carlson and W.B. Driggers unpubl.
        data). Both time-series indicate this population has begun to increase soon
        after the implementation of management. The annual fisheries-independent bottom
        longline surveys (Grace and Henwood 1998) were conducted throughout the northern
        Gulf of Mexico and Northwest Atlantic by the National Marine Fisheries Service
        (NMFS), Southeast Fisheries Science Center, Mississippi Laboratories; called
        the NMFS Mississippi bottom longline shark survey (NMFS-LL-SE, in number of
        sharks per 10,000 hook hours; Ingram et al. 2005). These data (red in the
        Supplementary Information) exhibit a steep increase in CPUE from 2010 onwards.
        Additionally, the commercial shark bottom longline fishery is active in the
        U.S. Atlantic Ocean from around North Carolina to Florida and throughout the
        eastern Gulf of Mexico (BLLOP) (Morgan \u003cem\u003eet al\u003c/em\u003e.
        2009). These data (green in the Supplementary Information) exhibited a slight,
        but variable increasing trend. Both time-series taken together for 1994–2017
        (24 years) demonstrated a median increase and the highest probability of an
        increase over three generation lengths (72.3 years).\u003cbr/\u003e\u003cbr/\u003eThird,
        the analysis of the South Pacific Queensland Shark Control Program’s bather
        protection netting program population abundance for 1964–2004 (41 years) yielded
        annual rates of reduction of 8.4% consistent with an estimated median reduction
        of 99.8% over three generation lengths (72.3 years), with the highest probability
        of \u0026gt;80% reduction over three generation lengths.\u003cbr/\u003e\u003cbr/\u003eFourth,
        the analysis of the Indian Ocean Natal Sharks Board bather protection netting
        program population abundance for 1978–2003 (26 years) yielded annual rates
        of reduction of 4.0% consistent with an estimated median reduction of 93.4%
        over three generation lengths (72.3 years), with the highest probability of
        \u0026gt;80% reduction over three generation lengths.\u003cbr/\u003eIn addition
        to these population trend analyses, we considered a recent analysis of fishery-dependent
        longline CPUE from the South Atlantic. These time-series are complex, reflecting
        access by different fleets and nationalities over time, but the best estimates
        of trends come from phase B spanning 1998 to 2008 during which 20 fleets (100
        vessels) fished for tunas, swordfishes, and sharks. During this 10-year period
        there was a 61.7% decline in CPUE of hammerheads (\u003cem\u003eSphyrna \u003c/em\u003espp.)
        (Table S11, Barreto \u003cem\u003eet al\u003c/em\u003e. 2016), however, because
        the data were not considered robust due to the low catch rates and large confidence
        intervals (R. Barreto unpubl. data), they were not analysed over three generations.\u003cbr/\u003e\u003cbr/\u003eAcross
        the regions, the Scalloped Hammerhead was estimated to have undergone steep
        declines in all oceans, with some signs of stabilization and possible recovery
        in response to management only in the Northwest Atlantic and Gulf of Mexico.
        To estimate a global population trend, the estimated three generation population
        trends for each region were weighted according to the relative size of each
        region; the two sources of Atlantic data were used to generate two global
        trends. This resulted in a median reduction of 76.9–97.3%, with the highest
        probability of \u0026gt;80% reduction over three generation lengths (72.3
        years), and therefore the Scalloped Hammerhead is assessed as Critically Endangered
        A2bd.","habitats":"The Scalloped Hammerhead is a coastal and semi-oceanic
        pelagic shark,  found over continental and insular shelves and nearby deep
        water, ranging from the intertidal and surface usually to 275 m depth, though
        has been recorded to 1,043 m (Moore and Gates 2015). Adults spend most of
        the time offshore in midwater and females migrate  to the coastal areas to
        pup (Clarke 1971, Bass \u003cem\u003eet al.\u003c/em\u003e 1975, Klimley and
        Nelson 1984, Branstetter 1987, Klimley 1987, Chen \u003cem\u003eet al.\u003c/em\u003e
        1988, Stevens and Lyle 1989). It reaches a maximum size of 370–420 cm total
        length (TL) (Ebert \u003cem\u003eet al. \u003c/em\u003e2013). Males mature
        at 140–198 cm TL and females at 200–250 cm TL (Compagno 1984, Branstetter
        1987, Chen \u003cem\u003eet al. \u003c/em\u003e1990, Carrera and Martinez
        2007, White\u003cem\u003e et al.\u003c/em\u003e 2008, Harry \u003cem\u003eet
        al.\u003c/em\u003e 2011).  Reproduction is placental viviparous with litter
        sizes of 12–41, an annual or biennial reproductive cycle, and a size at birth
        of 31–57 cm TL (Branstetter 1987, Chen\u003cem\u003e et al. \u003c/em\u003e1988,
        1990; Stevens and Lyle 1989, Oliveira 1991, Amorim \u003cem\u003eet al\u003c/em\u003e.
        1994, Oliveira \u003cem\u003eet al.\u003c/em\u003e 1997, White \u003cem\u003eet
        al\u003c/em\u003e. 2008, Harry \u003cem\u003eet al.\u003c/em\u003e 2011, Clarke
        \u003cem\u003eet al. \u003c/em\u003e2015, Gallagher and Klimley 2018). Annual
        band pair deposition for the Scalloped Hammerhead is assumed based on bomb
        radiocarbon validation of the Great Hammerhead (\u003cem\u003eSphyrna mokarran\u003c/em\u003e)
        (Passerotti\u003cem\u003e et al.\u003c/em\u003e 2010); female age-at-maturity
        of the Scalloped Hammerhead is 13.2 years and maximum age is 35 years; generation
        length is  therefore 24.1 years (Drew \u003cem\u003eet al.\u003c/em\u003e
        2015). Population growth rate estimates are 0.10–1.22 per year (Harry 2011,
        Cortés \u003cem\u003eet al.\u003c/em\u003e 2012).","threats":"\u003cp\u003e  \u003c/p\u003e\u003cp\u003eThe
        Scalloped Hammerhead is caught globally as target and bycatch in commercial
        and small-scale pelagic longline, purse seine, and gillnet fisheries. Most
        of the catch is taken as bycatch of industrial pelagic fleets in offshore
        and high-seas waters (Camhi \u003cem\u003eet al.\u003c/em\u003e 2008). It
        is also captured in coastal longlines, gillnets, trammel nets, and sometimes
        trawls, particularly in areas with narrow continental shelves (Camhi \u003cem\u003eet
        al.\u003c/em\u003e 2008, Martinez-Ortiz \u003cem\u003eet al.\u003c/em\u003e
        2015, Temple \u003cem\u003eet al.\u003c/em\u003e 2019). The species is also
        taken in beach protection programs that target large sharks (Dudley and Simpfendorfer
        2006, Simpfendorfer\u0026#160;\u003cem\u003eet al.\u003c/em\u003e\u0026#160;2010,
        Reid\u0026#160;\u003cem\u003eet al.\u003c/em\u003e\u0026#160;2011).\u003c/p\u003e  \u003cp\u003eThe
        species is generally retained for the meat and fins (Clarke \u003cem\u003eet
        al.\u003c/em\u003e 2006a\u003cem\u003e, \u003c/em\u003eClarke\u003cem\u003e
        et al. \u003c/em\u003e2006b, Dent and Clarke 2015\u003cem\u003e,\u003c/em\u003e
        Fields \u003cem\u003eet al.\u003c/em\u003e 2018), unless regulations prohibit
        retention\u003cem\u003e. \u003c/em\u003eUnder-reporting of catches in pelagic
        and domestic fisheries is likely (Dent and Clarke 2015).\u003cem\u003e \u003c/em\u003eThe
        species has high at-vessel mortality of 57.1% on Portuguese longlines in the
        Atlantic, 62.9% on United States shark bottom-longlines, and 71.4% for Western
        Australian demersal longlines (Coelho \u003cem\u003eet al.\u003c/em\u003e
        2012, Gulak\u0026#160;\u003cem\u003eet al.\u0026#160;\u003c/em\u003e2015,
        Braccini and Waltrick 2019). The post-release mortality is higher for injured
        released  sharks and has been reported as 100% for the Scalloped Hammerhead
        in  purse seines (Eddy \u003cem\u003eet al.\u003c/em\u003e 2016).\u0026#160;\u003c/p\u003e","measures":"\u003cp\u003e  \u003c/p\u003e\u003cp\u003eThe
        success of actions agreed through international wildlife and fisheries treaties
        depends on implementation at the domestic level; for sharks, such follow up
        actions have to date been seriously lacking. \u003c/p\u003e  \u003cp\u003eIn
        2010, the International Commission for the Conservation of Atlantic Tunas
        (ICCAT) prohibited retention, transshipment, landing, and sale of Scalloped
        Hammerheads (and other hammerhead species) for ICCAT fisheries operating in
        the Convention Area. There are exceptions for local consumption in developing
        countries, provided they cap catches, meet catch data reporting requirements,
        and ensure fins are not traded internationally. The Western and Central Pacific
        Fisheries Commission (WCPFC) designated the Scalloped Hammerhead as a ''key
        shark species'' in 2010, but has yet to adopt hammerhead catch limits. Several
        proposals to ban hammerhead landings and/or set regional hammerhead fishing
        limits through the Inter-American Tropical Tuna Commission (IATTC) have been
        defeated. The Indian Ocean Tuna Commission (IOTC) has yet to act on 2018 scientific
        advice to adopt Scalloped Hammerhead fishery management measures. \u003c/p\u003e  \u003cp\u003eIn
        2012, the General Fisheries Commission for the Mediterranean (GFCM) banned
        retention and mandated careful release for the Scalloped Hammerhead and 23
        other elasmobranch species listed on the Barcelona Convention Annex II. Implementation
        by GFCM Parties, however, has been very slow. In 2013, the Scalloped Hammerhead
        was added to Appendix II of the Convention on International Trade in Endangered
        Species (CITES), which requires CITES Parties to ensure that exports be accompanied
        by permits based on findings that parts are sourced from legal and sustainable
        fisheries. In 2014, the Scalloped Hammerhead was listed on Appendix II of
        the Convention on Migratory Species (CMS), which reflects Parties’ commitments
        to work regionally toward conservation. The species is also covered by the
        CMS Memorandum of Understanding for Migratory Sharks, which is aimed at facilitating
        conservation. \u003c/p\u003e    \u003cp\u003eTo allow recovery, it is recommended
        that all Scalloped Hammerhead retention and landings be prohibited, at least
        as long as the global population is classified as Critically Endangered or
        Endangered. Initiatives to prevent capture, minimize bycatch mortality, promote
        safe release, and improve catch (including discard) reporting are also urgently
        needed, as is full implementation of additional commitments agreed through
        international treaties.\u003c/p\u003e","use_trade":"\u003cp\u003e  \u003c/p\u003e\u003cp\u003eThe
        main product from the species that is traded is the fins (CITES 2013). Hammerhead
        fins are among the main shark species in the fin trade and one of the preferred
        species for shark fin soup (Clarke\u003cem\u003e et al.\u003c/em\u003e 2006a,
        Dent and Clarke 2015, Fields\u003cem\u003e et al.\u003c/em\u003e 2018). Three
        species of hammerhead shark, Scalloped Hammerhead, Great Hammerhead, and Smooth
        Hammerhead (\u003cem\u003eSphyrna zygaena\u003c/em\u003e), collectively accounted
        for 4% of the fin imported in Hong Kong in 2014 (Fields\u003cem\u003e et al.\u003c/em\u003e
        2018). The meat, liver oil, skin, cartilage and jaws may also be used (Almerón-Souza
        \u003cem\u003eet al.\u003c/em\u003e 2018).\u003c/p\u003e  \u003cp\u003e\u003c/p\u003e\u003cp\u003e\u003c/p\u003e","rationale":"\u003cp\u003eThe
        Scalloped Hammerhead (\u003cem\u003eSphyrna lewini\u003c/em\u003e)  is a large
        (to 420 cm total length) coastal and semi-oceanic pelagic shark that is circumglobal
        in warm-temperate and tropical seas, from the surface and intertidal zone
        to depths of 1,043 m. The global population structure varies between males
        and females; males  move across ocean basins, while females only move regionally.
        The species is caught globally as target and bycatch in  pelagic commercial
        and small-scale longline, purse seine, and gillnet  fisheries, and is retained
        for the meat and fins. The Scalloped Hammerhead has undergone steep declines
        in all oceans, with some signs of stabilization  and possible recovery in
        response to management only in the Northwest  Atlantic and Gulf of Mexico.
        The weighted global population trend estimated median reductions of 76.9–97.3%,
        with the highest probability of \u0026gt;80% reduction over three generation
        lengths (72.3 years), and is therefore assessed as Critically Endangered A2bd.\u003c/p\u003e","trend_justification":null,"taxonomic_notes":null},"biogeographical_realms":[],"conservation_actions":[{"note":"","code":"3_1_1","description":{"en":"Harvest
